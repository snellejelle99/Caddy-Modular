name: Docker

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  schedule:
    - cron: '13 12 * * *'
  push:
    branches: [ "main" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}


jobs:
  check_version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write
    outputs:
      skip_build: ${{ steps.skip.outputs.skip_build }}
      caddy_version: ${{ steps.caddy.outputs.version }}

    steps:
      - name: Get latest Caddy stable version
        id: caddy
        run: |
          VERSION=$(curl -s https://registry.hub.docker.com/v2/repositories/library/caddy/tags/?page_size=100 \
            | jq -r '.results[].name' \
            | grep -E '^[0-9]+\.[0-9]+(\.[0-9]+)?$' \
            | sort -V \
            | tail -n1)
          echo "Latest stable version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Debug version
        run: |
            echo "Detected caddy version: ${{ steps.caddy.outputs.version }}"

      - name: Check package version 
        id: skip
        run: |
          TOKEN=$(curl https://ghcr.io/token\?scope\="repository:${{ github.repository }}:pull" | jq -r .token)
          curl -H "Authorization: Bearer ${TOKEN}" https://ghcr.io/v2/${{ github.repository }}/tags/list
          TAGFOUND=$(curl --fail -H "Authorization: Bearer ${TOKEN}" https://ghcr.io/v2/${{ github.repository }}/tags/list | jq -r '.tags? | index("${{ steps.caddy.outputs.version }}")')
          SKIPBUILD=$(if [ $TAGFOUND != "null" ]; then echo "true"; else echo "false"; fi)
          echo "pkg_index=$TAGFOUND" >> "$GITHUB_OUTPUT"
          echo "skip_build=$SKIPBUILD" >> "$GITHUB_OUTPUT"
          
      - name: Debug check package version
        run: |
            echo "Detected existing caddy in github registry: ${{ steps.skip.outputs.skip_build }} ${{ steps.skip.outputs.pkg_index }}"
    

  build:
    needs: check_version
    if: needs.check_version.outputs.skip_build != 'true'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0
        
      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{needs.check_version.outputs.caddy_version}}

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7.2.0
        with:
          provenance: false
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
